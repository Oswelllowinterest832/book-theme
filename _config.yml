# Site settings
title: My Little Library
tagline: "Changing the world, one uninspired quote at a time"
url: "http://library.darbooks.com" # The base hostname & protocol for your site. Use it if you need absolute URL's

# Blog/Posts settings
permalink: /blog/:year/:month/:day/:title/
excerpt_separator: "<!-- excerpt -->"

collections:
  books:
    output: true
    permalink: /books/:title/
  chapters:
    output: true
    permalink: /chapters/:path/
    sort_by: chapter

defaults:
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book-profile"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-fa-icons

# Social
socialimg: /img/social.jpg # be sure to change this image
facebook: fbusername
twitter: twusername
github: ghusername
googleplus: gusername
instagram: igusername

# Contact
phone: "916-276-1044" # This is my real number. You should text me.
email: "hello@garrettboatman.com" # This is my real email address. Please don't email me.

# Use this for production
#sass:
#    style: compressed

exclude: [README.md, node_modules, gruntfile.js, package.json, book-theme.gemspec, Gemfile.lock]
